<!doctype html>
<html lang="hr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Galerija | Studio Amage</title>
    <meta name="description" content="Premium galerija Studio Amage: transformacije, detalji i atmosfera salona u Splitu." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Poppins:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../styles.css" />

  <body class="gallery-page">
    <header class="blog-topbar">
      <div class="container blog-topbar-wrap">
        <a href="../index.html" class="brand" aria-label="Povratak na početnu">
          <img src="../assets/logo_amage.png" alt="Amage Hair Studio logo" class="brand-logo" />
        </a>
        <a href="../index.html#rezervacija" class="btn btn-primary">Rezerviraj termin</a>
      </div>
    </header>

          <h1>Galerija</h1>

        <div class="gallery-blocks-grid">
          <section class="gallery-block reveal" aria-label="Galerija layout 1">
            <div class="gallery-layout gallery-layout-1">
              <img src="../assets/layout1-1.jpg" alt="Studio Amage galerija 1-1" class="gallery-lightbox-img" loading="lazy" decoding="async" />
              <img src="../assets/layout1-2.jpg" alt="Studio Amage galerija 1-2" class="gallery-lightbox-img" loading="lazy" decoding="async" />

              <img src="../assets/layout2-2.jpg" alt="Studio Amage galerija 2-2" class="gallery-lightbox-img" loading="lazy" decoding="async" />
              <img src="../assets/layout2-3.jpg" alt="Studio Amage galerija 2-3" class="gallery-lightbox-img" loading="lazy" decoding="async" />

            </div>
          </section>

          <section class="gallery-block reveal" aria-label="Galerija layout 3">

              <img src="../assets/layout3-1.jpg" alt="Studio Amage galerija 3-1" class="gallery-lightbox-img" loading="lazy" decoding="async" />
              <img src="../assets/layout3-2.jpg" alt="Studio Amage galerija 3-2" class="gallery-lightbox-img" loading="lazy" decoding="async" />
              <img src="../assets/layout3-3.jpg" alt="Studio Amage galerija 3-3" class="gallery-lightbox-img" loading="lazy" decoding="async" />
            </div>
          </section>

          <section class="gallery-block reveal" aria-label="Galerija layout 4">
            <div class="gallery-layout gallery-layout-4">
              <img src="../assets/layout4-1.jpg" alt="Studio Amage galerija 4-1" class="gallery-lightbox-img" loading="lazy" decoding="async" />
              <img src="../assets/layout4-2.jpg" alt="Studio Amage galerija 4-2" class="gallery-lightbox-img" loading="lazy" decoding="async" />
              <img src="../assets/layout4-3.jpg" alt="Studio Amage galerija 4-3" class="gallery-lightbox-img" loading="lazy" decoding="async" />
              <img src="../assets/layout4-4.jpg" alt="Studio Amage galerija 4-4" class="gallery-lightbox-img" loading="lazy" decoding="async" />
              <img src="../assets/layout4-5.jpg" alt="Studio Amage galerija 4-5" class="gallery-lightbox-img" loading="lazy" decoding="async" />
              <img src="../assets/layout4-6.jpg" alt="Studio Amage galerija 4-6" class="gallery-lightbox-img" loading="lazy" decoding="async" />
              <img src="../assets/layout4-7.jpg" alt="Studio Amage galerija 4-7" class="gallery-lightbox-img" loading="lazy" decoding="async" />
            </div>
          </section>
        </div>

        <div class="transform-cta reveal">
          <a href="../index.html#rezervacija" class="btn btn-primary">Rezerviraj svoj termin</a>
        </div>
      </div>
    </main>

    <div class="gallery-lightbox" id="gallery-lightbox" hidden>

      <img class="gallery-lightbox-image" id="gallery-lightbox-image" alt="" />

    <footer class="site-footer">
      <div class="container">
        <div class="footer-grid">
          <div class="footer-col">
            <a href="../index.html#vrh" class="footer-brand-link" aria-label="Studio Amage početna">

          <div class="footer-col">
